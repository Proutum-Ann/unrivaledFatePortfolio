<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Google Sheets Example</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>Google Sheets Data</h1>
        <div v-if="loading">Loading...</div>
        <div v-else-if="error">{{ error }}</div>
        <ul v-else>
            <li v-for="(item, index) in items" :key="index">
                <strong>Row {{ index + 1 }}</strong>
                <ul>
                    <li v-for="(value, key) in item" :key="key">
                        <template v-if="['image', 'img', 'picture', 'photo', 'imageUrl', 'image_url', 'thumb', 'thumbnail'].includes(key.toLowerCase()) && value">
                            <strong>{{ key }}:</strong>
                            <div style="max-width:240px; margin:0.4rem 0;">
                                <img :src="value" :alt="key" style="width:100%; height:auto; border:1px solid #ccc;" />
                            </div>
                        </template>
                        <template v-else>
                            <strong>{{ key }}:</strong> {{ value }}
                        </template>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
    <script src="example.js"></script>
</body>
</html>
