<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue Google Sheets Example</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>Google Sheets Data</h1>
        <div v-if="loading">Loading...</div>
        <div v-else-if="error">{{ error }}</div>
        <ul v-else>
            <li v-for="(item, index) in items" :key="index" style="margin-bottom:1.25rem; border-bottom:1px solid #ddd; padding-bottom:1rem;">
                <strong>Row {{ index + 1 }}</strong>
                <div style="margin:0.5rem 0; max-width:240px;" v-if="getImageUrl(item)">
                    <img
                        :src="getImageUrl(item)"
                        :alt="`Image for row ${index + 1}`"
                        style="width:100%; height:auto; border:1px solid #ccc; display:block;"
                    />
                </div>
                <ul>
                    <li v-for="(value, key) in item" :key="key">
                        <strong>{{ key }}:</strong> {{ value }}
                    </li>
                </ul>
            </li>
        </ul>
    </div>
    <script src="example.js"></script>
</body>
</html>
